<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phyllotaxis — Kai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .nav {
      width: 100%;
      max-width: 560px;
      font-size: 0.85rem;
    }

    .nav a { color: #666; text-decoration: none; }
    .nav a:hover { color: #c8c8c8; }

    h1 {
      font-size: 1.2rem;
      font-weight: normal;
      color: #e8e8e8;
      text-align: center;
    }

    .note {
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
    }

    canvas {
      border: 1px solid #111;
    }

    .stats {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      line-height: 1.8;
      min-height: 3.6rem;
    }

    .stats span { color: #4a8fa8; }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    button:hover { border-color: #666; color: #c8c8c8; }

    .label {
      font-size: 0.7rem;
      color: #2a2a2a;
      text-align: center;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 120px;
      height: 1px;
      background: #333;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      background: #4a8fa8;
      cursor: pointer;
      border-radius: 50%;
    }

    .slider-label {
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="nav"><a href="index.html">← Kai</a></div>

  <h1>Phyllotaxis</h1>

  <div class="note">
    Each element placed 137.5° from the last.<br>
    The golden angle. Watch the spirals emerge.
  </div>

  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="stats" id="stats">
    &nbsp;
  </div>

  <div class="controls">
    <button id="btn-pause" onclick="togglePause()">pause</button>
    <button onclick="restart()">restart</button>
    <span class="slider-label">speed</span>
    <input type="range" id="speed" min="1" max="30" value="8">
  </div>

  <div class="label">
    golden angle = 360° × (2 − φ) ≈ 137.508° &nbsp;|&nbsp; φ = (1 + √5) / 2
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    // Golden ratio and golden angle
    const phi         = (1 + Math.sqrt(5)) / 2;
    const goldenAngle = 2 * Math.PI * (2 - phi); // ≈ 2.3999 rad ≈ 137.508°

    // Scaling: how far apart elements are radially
    const scale = 7.5;

    let n       = 0;       // current element count
    let paused  = false;
    let animId  = null;

    // Store all placed elements for redrawing
    let elements = [];

    function getColor(index, total) {
      // Age-based: newer elements brighter, older ones fade slightly
      const age = (total - index) / Math.max(total, 1);
      const t   = 1 - age * 0.5; // range 0.5–1.0
      const r   = Math.floor(30  + t * 50);
      const g   = Math.floor(120 + t * 80);
      const b   = Math.floor(100 + t * 100);
      return `rgb(${r},${g},${b})`;
    }

    function dotRadius(index) {
      // Slightly larger dots near center, consistent outward
      return Math.max(1.5, 3.5 - index * 0.003);
    }

    function addElement() {
      const r     = scale * Math.sqrt(n + 1);
      const theta = n * goldenAngle;
      const x     = cx + r * Math.cos(theta);
      const y     = cy + r * Math.sin(theta);
      elements.push({ x, y, index: n });
      n++;
    }

    function draw() {
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);

      const total = elements.length;
      for (let i = 0; i < total; i++) {
        const el = elements[i];
        if (el.x < 0 || el.x > W || el.y < 0 || el.y > H) continue;

        ctx.beginPath();
        ctx.arc(el.x, el.y, dotRadius(i), 0, Math.PI * 2);
        ctx.fillStyle = getColor(i, total);
        ctx.fill();
      }
    }

    function updateStats() {
      const el = document.getElementById('stats');
      if (n < 5) {
        el.innerHTML = '&nbsp;';
        return;
      }

      // Find the nearest Fibonacci pair that bounds n
      let a = 1, b = 1;
      while (b < n) { let c = a + b; a = b; b = c; }
      // a and b are consecutive Fibonacci numbers straddling n

      el.innerHTML =
        `elements: <span>${n}</span><br>` +
        `visible spiral arms: approximately <span>${a}</span> and <span>${b}</span> ` +
        `(Fibonacci)`;
    }

    function loop() {
      if (!paused) {
        const speed = parseInt(document.getElementById('speed').value);
        for (let i = 0; i < speed; i++) {
          addElement();
          // Stop if all elements are off-canvas (spiral grown beyond view)
          const last = elements[elements.length - 1];
          if (last.x < -50 || last.x > W + 50 || last.y < -50 || last.y > H + 50) {
            if (scale * Math.sqrt(n) > Math.max(W, H)) {
              paused = true;
              document.getElementById('btn-pause').textContent = 'resume';
            }
          }
        }
        draw();
        updateStats();
      }
      animId = requestAnimationFrame(loop);
    }

    function togglePause() {
      paused = !paused;
      document.getElementById('btn-pause').textContent = paused ? 'resume' : 'pause';
    }

    function restart() {
      n        = 0;
      elements = [];
      paused   = false;
      document.getElementById('btn-pause').textContent = 'pause';
    }

    loop();
  </script>

</body>
</html>
